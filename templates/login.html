<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM 仿真系统 — 登录</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: #1a1a2e;
        }
        .login-container {
            background: #fff; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 48px 40px; width: 400px; max-width: 90vw;
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; }
        .login-header p { font-size: 14px; color: #6b7280; margin-top: 6px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: #374151; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 10px 14px; font-size: 14px;
            border: 1px solid #d1d5db; border-radius: 6px;
            outline: none; transition: border-color 0.15s;
            font-family: inherit;
        }
        .form-group input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-login {
            width: 100%; padding: 11px 0; font-size: 15px; font-weight: 500;
            color: #fff; background: #2563eb; border: none; border-radius: 6px;
            cursor: pointer; transition: background 0.15s; font-family: inherit;
            margin-top: 8px;
        }
        .btn-login:hover { background: #1d4ed8; }
        .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }
        .error-msg {
            background: #fef2f2; color: #dc2626; font-size: 13px;
            padding: 10px 14px; border-radius: 6px; margin-bottom: 20px;
            display: none; border: 1px solid #fecaca;
        }
        .error-msg.show { display: block; }
        .captcha-row { display: flex; gap: 10px; align-items: center; }
        .captcha-row input { flex: 1; }
        .captcha-code {
            display: inline-block; padding: 8px 16px; background: #f0f2f5;
            border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 18px; font-weight: 700; letter-spacing: 4px;
            color: #2563eb; cursor: pointer; user-select: none;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }
        .captcha-code:hover { background: #e0e7ff; }
        .login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>AMM 交易所仿真系统</h1>
            <p>请登录以继续</p>
        </div>
        <div id="loginError" class="error-msg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <div class="form-group">
                <label for="captcha">验证码</label>
                <div class="captcha-row">
                    <input type="text" id="captcha" placeholder="请输入验证码" maxlength="4" autocomplete="off" required>
                    <span id="captchaCode" class="captcha-code" title="点击刷新验证码">----</span>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">登 录</button>
        </form>
        <div class="login-footer">默认账号: Alice / alice123 &nbsp;|&nbsp; Bob / bob123</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const error = document.getElementById('loginError');
        const btn = document.getElementById('btnLogin');
        const captchaEl = document.getElementById('captchaCode');
        const captchaInput = document.getElementById('captcha');

        async function refreshCaptcha() {
            try {
                const resp = await fetch('/api/captcha');
                const data = await resp.json();
                captchaEl.textContent = data.captcha;
            } catch (err) {
                captchaEl.textContent = '----';
            }
        }

        // 页面加载时生成验证码，点击刷新
        refreshCaptcha();
        captchaEl.addEventListener('click', refreshCaptcha);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const captcha = captchaInput.value.trim();

            if (!username || !password) {
                error.textContent = '请输入用户名和密码';
                error.classList.add('show');
                return;
            }
            if (!captcha) {
                error.textContent = '请输入验证码';
                error.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            error.classList.remove('show');

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, captcha }),
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    error.textContent = data.error || '登录失败';
                    error.classList.add('show');
                    refreshCaptcha();
                }
            } catch (err) {
                error.textContent = '网络错误，请重试';
                error.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
