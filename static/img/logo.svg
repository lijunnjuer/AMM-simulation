<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 坐标网格图案 -->
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"
             patternTransform="translate(12,12)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#2563eb" stroke-width="0.04" opacity="0.12"/>
      <line x1="0" y1="0" x2="10" y2="0" stroke="#2563eb" stroke-width="0.04" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- 底板: 白色卡片 + 极细蓝边框 -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="0.8" opacity="0.95"/>
  <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#grid)"/>

  <!-- ============================================================
       坐标轴线 (X/Y 轴参考线, 从卡片边缘到中心偏右/偏上)
       ============================================================ -->
  <!-- X轴参考线 -->
  <line x1="12" y1="51" x2="56" y2="51" stroke="#2563eb" stroke-width="0.6" opacity="0.30"/>
  <!-- Y轴参考线 -->
  <line x1="12" y1="51" x2="12" y2="10" stroke="#2563eb" stroke-width="0.6" opacity="0.30"/>

  <!-- ============================================================
       第一象限 x·y=k 双曲线
       精确的三段贝塞尔逼近:
       A(18,16) → B(26,31) → C(40,42) → D(50,49)
       ============================================================ -->
  <path d="M 18 16
           C 22 19, 24 26, 26 31
           C 28 36, 34 40, 40 42
           C 43 43, 47 46, 50 49"
        fill="none" stroke="#2563eb" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 曲线上半透明叠层 (增加厚度感) -->
  <path d="M 18 16
           C 22 19, 24 26, 26 31
           C 28 36, 34 40, 40 42
           C 43 43, 47 46, 50 49"
        fill="none" stroke="#2563eb" stroke-width="0.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- ============================================================
       ETH Token (左上方 — 圆形, 靠近曲线起点)
       ============================================================ -->
  <circle cx="17" cy="15" r="5.0" fill="#2563eb" opacity="0.08"/>
  <circle cx="17" cy="15" r="5.0" fill="none" stroke="#2563eb" stroke-width="1.2"/>
  <circle cx="17" cy="15" r="2.2" fill="#2563eb"/>
  <!-- ETH 菱形标记 -->
  <polygon points="17,11.5 19.5,15 17,18.5 14.5,15"
           fill="#ffffff" stroke="none"/>

  <!-- ============================================================
       USDC Token (右下方 — 切角方形, 靠近曲线终点)
       ============================================================ -->
  <rect x="46" y="45" width="9" height="9" rx="1.5"
        fill="#1e3a5f" stroke="#2563eb" stroke-width="1.1"/>
  <!-- USDC $ 标记 -->
  <text x="50.5" y="52.5" text-anchor="middle" fill="#ffffff"
        font-size="6.5" font-weight="700"
        font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace"
        letter-spacing="-0.3">$</text>

  <!-- ============================================================
       当前价格点 (曲线上 — 珊瑚色强调)
       ============================================================ -->
  <circle cx="33" cy="36" r="3.0" fill="#f87171" opacity="0.12"/>
  <circle cx="33" cy="36" r="1.8" fill="none" stroke="#f87171" stroke-width="1.0"/>
  <circle cx="33" cy="36" r="0.7" fill="#f87171"/>

  <!-- 价格点到 USDC 的微连线 -->
  <line x1="33" y1="36" x2="33" y2="51" stroke="#f87171" stroke-width="0.35" opacity="0.35" stroke-dasharray="1.5 1.5"/>

</svg>
