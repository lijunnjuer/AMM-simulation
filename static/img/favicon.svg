<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <pattern id="grid" width="6" height="6" patternUnits="userSpaceOnUse"
             patternTransform="translate(6,6)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#2563eb" stroke-width="0.05" opacity="0.12"/>
      <line x1="0" y1="0" x2="6" y2="0" stroke="#2563eb" stroke-width="0.05" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- 底板 -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="0.6"/>
  <rect x="0" y="0" width="32" height="32" rx="6" fill="url(#grid)"/>

  <!-- 坐标轴参考线 -->
  <line x1="6" y1="25" x2="28" y2="25" stroke="#2563eb" stroke-width="0.4" opacity="0.25"/>
  <line x1="6" y1="25" x2="6" y2="5" stroke="#2563eb" stroke-width="0.4" opacity="0.25"/>

  <!-- x·y=k 双曲线 -->
  <path d="M 9 8
           C 12 11, 13 18, 18 23
           C 21 26, 25 27.5, 27 28"
        fill="none" stroke="#2563eb" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 曲线薄层 -->
  <path d="M 9 8
           C 12 11, 13 18, 18 23
           C 21 26, 25 27.5, 27 28"
        fill="none" stroke="#2563eb" stroke-width="0.4"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- ETH 圆点 -->
  <circle cx="8.5" cy="7.5" r="3.0" fill="#2563eb" opacity="0.08"/>
  <circle cx="8.5" cy="7.5" r="3.0" fill="none" stroke="#2563eb" stroke-width="0.9"/>
  <circle cx="8.5" cy="7.5" r="1.3" fill="#2563eb"/>
  <polygon points="8.5,5.5 10,7.5 8.5,9.5 7,7.5" fill="#ffffff" stroke="none"/>

  <!-- USDC 切角方块 -->
  <rect x="23.5" y="23" width="5.5" height="5.5" rx="1.0"
        fill="#1e3a5f" stroke="#2563eb" stroke-width="0.8"/>
  <text x="26.25" y="27.1" text-anchor="middle" fill="#ffffff"
        font-size="4.0" font-weight="700"
        font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace">$</text>

  <!-- 价格点 -->
  <circle cx="17" cy="18" r="1.5" fill="#f87171" opacity="0.15"/>
  <circle cx="17" cy="18" r="1.0" fill="none" stroke="#f87171" stroke-width="0.7"/>
  <circle cx="17" cy="18" r="0.4" fill="#f87171"/>

</svg>
